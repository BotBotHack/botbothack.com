<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#050709">
  <title>...</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Atmospheric layers -->
  <div class="bg-glow" aria-hidden="true"></div>
  <div class="bg-scan" aria-hidden="true"></div>

  <!-- The hero text -->
  <main class="stage">
    <h1 class="prompt" aria-live="polite">
      <span id="promptText"></span><span id="promptCursor" class="cursor"></span>
    </h1>
  </main>

  <!-- Minimal language switcher in corner -->
  <nav class="lang-switch" aria-label="Language">
    <button class="lang-btn" data-lang="ru" type="button">RU</button>
    <span class="lang-sep">/</span>
    <button class="lang-btn" data-lang="en" type="button">EN</button>
  </nav>

  <script src="app.js"></script>
</body>
</html>
